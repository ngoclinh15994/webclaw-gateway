<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebClaw Sync</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #22c55e;
        --accent-2: #0ea5e9;
        --error: #ef4444;
        --border: #1f2937;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 14px;
        width: 340px;
        min-height: 250px;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: linear-gradient(180deg, #0b1220, var(--bg));
        color: var(--text);
      }

      .card {
        background: rgba(17, 24, 39, 0.95);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        line-height: 1.2;
      }

      .domain {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .buttons {
        display: grid;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
        font-weight: 600;
        color: #08111f;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #copy-btn {
        background: var(--accent-2);
      }

      #sync-btn {
        background: var(--accent);
      }

      #status {
        margin-top: 12px;
        border-radius: 9px;
        padding: 10px;
        font-size: 12px;
        line-height: 1.35;
        border: 1px solid transparent;
        min-height: 38px;
      }

      .status-neutral {
        color: var(--muted);
        background: rgba(2, 6, 23, 0.45);
        border-color: #1e293b;
      }

      .status-success {
        color: #dcfce7;
        background: rgba(22, 101, 52, 0.25);
        border-color: rgba(34, 197, 94, 0.55);
      }

      .status-error {
        color: #fee2e2;
        background: rgba(127, 29, 29, 0.3);
        border-color: rgba(239, 68, 68, 0.65);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>WebClaw Sync</h1>
      <p id="domain-text" class="domain">Current Site: Detecting...</p>

      <div class="buttons">
        <button id="copy-btn" type="button" title="Copy Cookies to Clipboard">📋 Copy Cookies to Clipboard</button>
        <button id="sync-btn" type="button" title="1-Click Sync to WebClaw">⚡ 1-Click Sync to WebClaw</button>
      </div>

      <div id="status" class="status-neutral" role="status" aria-live="polite">Ready.</div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
